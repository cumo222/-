<div id="ui">3D跑酷 v1.0</div>

<!-- 引入 Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ===== 基础场景 =====
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 30);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== 光 =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ===== 地面 =====
const groundGeo = new THREE.PlaneGeometry(20, 200);
const groundMat = new THREE.MeshStandardMaterial({color:0x111111});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.z = -50;
scene.add(ground);

// ===== 玩家（相机位置）=====
camera.position.y = 1.5;
camera.position.z = 5;

// ===== 轨道 =====
const lanes = [-2, 0, 2];
let lane = 1;

// ===== 方块 =====
let blocks = [];

function spawnBlock(z){
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshStandardMaterial({color:0x00ff00});
  const box = new THREE.Mesh(geo, mat);

  box.position.x = lanes[Math.floor(Math.random()*3)];
  box.position.y = 0.5;
  box.position.z = z;

  scene.add(box);
  blocks.push(box);
}

// 初始
for(let i=0;i<15;i++){
  spawnBlock(-i*4);
}

// ===== 控制 =====
function jump(){
  camera.position.y = 2.5;
  setTimeout(()=>camera.position.y=1.5,300);
}

function move(){
  lane = (lane+1)%3;
  camera.position.x = lanes[lane];
}

window.addEventListener("touchstart", move);
window.addEventListener("mousedown", move);
window.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
});

// ===== 游戏循环 =====
function animate(){
  requestAnimationFrame(animate);

  // 方块向玩家移动（Z减少）
  for(let b of blocks){
    b.position.z += 0.1;

    // 重置
    if(b.position.z > camera.position.z){
      b.position.z = -50;
      b.position.x = lanes[Math.floor(Math.random()*3)];
    }

    // 碰撞
    if(
      Math.abs(b.position.z - camera.position.z) < 0.5 &&
      Math.abs(b.position.x - camera.position.x) < 0.8 &&
      camera.position.y < 2
    ){
      alert("失败！");
      location.reload();
    }
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

// 🧠 三条轨道
const lanes=[-1,0,1]; // 左中右

let lane=1;

// 🧍 玩家（固定视角）
let player={
  y:0,
  vy:0,
  onGround:true
};

let gravity=0.8;
let jumpPower=-14;

// 📦 方块（Z轴距离）
let blocks=[];
let speed=6;
let score=0;
let gameOver=false;

// 创建方块
function spawn(z){
  blocks.push({
    z:z,
    lane:Math.floor(Math.random()*3),
    passed:false
  });
}

// 初始化
for(let i=0;i<15;i++){
  spawn(i*120);
}

// 🎮 控制
function jump(){
  if(gameOver){
    location.reload();
    return;
  }

  if(player.onGround){
    player.vy=jumpPower;
    player.onGround=false;
  }
}
addEventListener("touchstart",jump);
addEventListener("mousedown",jump);

// 🔁 更新
function update(){
  if(gameOver) return;

  // 重力
  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>0){
    player.y=0;
    player.vy=0;
    player.onGround=true;
  }

  // 世界推进（关键：Z轴）
  for(let b of blocks){
    b.z-=speed;

    // 加分
    if(!b.passed && b.z<0){
      score++;
      document.getElementById("score").innerText=score;
      b.passed=true;
    }

    // 碰撞判断（真正冲刺逻辑）
    if(b.z<20 && b.z>-20){
      if(b.lane===lane && player.y>-20){
        gameOver=true;
        alert("失败！分数：" + score);
      }
    }
  }

  // 补方块
  if(blocks[blocks.length-1].z<600){
    spawn(800+Math.random()*300);
  }
}

// 🎨 绘制（真正透视）
function draw(){
  ctx.fillStyle="#05060a";
  ctx.fillRect(0,0,c.width,c.height);

  let center=c.width/2;
  let baseY=c.height*0.75;

  // 地面
  ctx.fillStyle="#111";
  ctx.fillRect(0,baseY,c.width,c.height);

  // 🧱 方块（Z越小越大）
  for(let b of blocks){

    let scale=200/(b.z+200);
    let size=100*scale;

    let x=center + lanes[b.lane]*150*scale;
    let y=baseY-size;

    ctx.fillStyle="#4caf50";
    ctx.fillRect(x-size/2,y,size,size);
  }

  // 🧍 玩家（固定）
  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(center,baseY+player.y,18,0,Math.PI*2);
  ctx.fill();
}

// 🔁 loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>

<script>
const c = document.getElementById("c");

c.width = innerWidth;
c.height = innerHeight;

let player = {

  vy: 0,
  onGround: true
};

let gravity = 0.8;
let jumpPower = -14;

// 🧱 世界方块（向玩家移动）
let blocks = [];
let speed = 6;
let score = 0;
let gameOver = false;

// 生成方块（远处）
function spawn(x) {
  blocks.push({
    z: x,        // 距离（越小越近）
    lane: Math.floor(Math.random() * 3),
    passed:false
  });
}

// 初始
for(let i=0;i<12;i++){
  spawn(i*120);
}

// 🟢 点击跳
function jump(){
  if(gameOver){
    location.reload();
    return;
  }

  if(player.onGround){
    player.vy = jumpPower;
    player.onGround = false;
  }
}

addEventListener("touchstart", jump);
addEventListener("mousedown", jump);

// 📦 更新
function update(){
  if(gameOver) return;

  // 重力
  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= 0){
    player.y = 0;
    player.vy = 0;
    player.onGround = true;
  }

  // 世界移动（关键）
  for(let b of blocks){
    b.z -= speed;

    // 加分
    if(!b.passed && b.z < 0){
      score++;
      document.getElementById("score").innerText = score;
      b.passed = true;
    }

    // 碰撞（近距离判断）
    if(b.z < 40 && b.z > -20){
      if(player.y > -20){
        gameOver = true;
        alert("失败！分数：" + score);
      }
    }
  }

  // 新方块
  if(blocks[blocks.length-1].z < 600){
    spawn(800 + Math.random()*300);
  }
}

// 🎨 绘制（伪3D核心）
function draw(){
  ctx.fillStyle="#05060a";
  ctx.fillRect(0,0,c.width,c.height);

  // 地面
  ctx.fillStyle="#111";
  ctx.fillRect(0,c.height*0.75,c.width,c.height);

  // 🧱 方块（透视效果）
  for(let b of blocks){

    let scale = 200 / (b.z + 200);
    let size = 80 * scale;

    let x = c.width/2 + (b.lane-1)*120*scale;
    let y = c.height*0.75 - size;

    ctx.fillStyle="#4caf50";
    ctx.fillRect(x-size/2, y, size, size);
  }

  // 🧍 球（第一人称固定）
  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(c.width/2, c.height*0.75 + player.y, 18, 0, Math.PI*2);
  ctx.fill();
}

// 🔁 循环
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🛤️ 三条轨道
const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

let laneIndex = 1;

// 🧍 玩家
let player = {
  x: lanes[laneIndex],
  y: canvas.height * 0.75,
  r: 16,
  vy: 0,
  jumping: false
};

// 🧱 方块
let blocks = [];
let speed = 4;
let score = 0;
let gameOver = false;

// 生成方块（固定轨道）
function createBlock(x) {
  const lane = Math.floor(Math.random() * 3);
  blocks.push({
    x: x,
    y: canvas.height * 0.8,
    w: 80,
    h: 20,
    lane: lane,
    passed: false
  });
}

// 初始方块
for (let i = 0; i < 8; i++) {
  createBlock(i * 200);
}

// 🎮 控制（左右切轨 + 跳）
function control(e) {
  if (gameOver) {
    location.reload();
    return;
  }

  // 左右点击切轨
  if (e.touches) {
    let x = e.touches[0].clientX;
    if (x < canvas.width / 2) {
      laneIndex = Math.max(0, laneIndex - 1);
    } else {
      laneIndex = Math.min(2, laneIndex + 1);
    }
  } else {
    laneIndex = (laneIndex + 1) % 3;
  }

  player.x = lanes[laneIndex];
}

window.addEventListener("touchstart", control);
window.addEventListener("mousedown", control);

// 更新
function update() {
  if (gameOver) return;

  // 玩家位置锁定轨道
  player.x = lanes[laneIndex];

  // 方块移动
  for (let b of blocks) {
    b.x -= speed;

    // 加分
    if (!b.passed && b.x + b.w < player.x) {
      score++;
      b.passed = true;
      document.getElementById("score").innerText = score;
    }

    // 碰撞检测（自动落在方块上）
    if (
      b.lane === laneIndex &&
      player.y + player.r >= b.y &&
      player.y + player.r <= b.y + 10 &&
      b.x < player.x &&
      b.x + b.w > player.x
    ) {
      player.y = b.y - player.r;
      player.jumping = false;
      player.vy = 0;
    }
  }

  // 生成新方块
  if (blocks[blocks.length - 1].x < canvas.width) {
    createBlock(canvas.width + Math.random() * 200);
  }

  // 掉落
  if (player.y > canvas.height) {
    gameOver = true;
    alert("失败！分数：" + score);
  }
}

// 绘制
function draw() {
  ctx.fillStyle = "#0b0b12";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 轨道线
  ctx.strokeStyle = "#222";
  for (let x of lanes) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  // 方块
  ctx.fillStyle = "#4caf50";
  for (let b of blocks) {
    if (b.lane === 0) ctx.fillRect(lanes[0] - 40, b.x, b.w, b.h);
    if (b.lane === 1) ctx.fillRect(lanes[1] - 40, b.x, b.w, b.h);
    if (b.lane === 2) ctx.fillRect(lanes[2] - 40, b.x, b.w, b.h);
  }

  // 玩家球
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();
}

// 游戏循环
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 玩家
let player = {
  x: canvas.width * 0.2,
  y: canvas.height * 0.5,
  r: 15,
  vy: 0,
  gravity: 0.6,
  jump: -12
};

let platforms = [];
let score = 0;
let gameOver = false;

// 生成平台
function createPlatform(x) {
  let w = 120;
  let h = 20;
  let y = Math.random() * (canvas.height * 0.6) + canvas.height * 0.2;
  platforms.push({x, y, w, h});
}

// 初始化平台
for (let i = 0; i < 6; i++) {
  createPlatform(i * 200);
}

// 点击跳跃
function jump() {
  if (gameOver) {
    location.reload();
    return;
  }
  player.vy = player.jump;
}

window.addEventListener("touchstart", jump);
window.addEventListener("mousedown", jump);

// 更新
function update() {
  if (gameOver) return;

  player.vy += player.gravity;
  player.y += player.vy;

  platforms.forEach(p => {
    p.x -= 3;

    // 加分
    if (p.x + p.w < player.x && !p.passed) {
      score++;
      p.passed = true;
      document.getElementById("score").innerText = score;
    }

    // 碰撞
    if (
      player.x > p.x &&
      player.x < p.x + p.w &&
      player.y + player.r > p.y &&
      player.y + player.r < p.y + p.h + 10 &&
      player.vy > 0
    ) {
      player.y = p.y - player.r;
      player.vy = 0;
    }
  });

  // 生成新平台
  if (platforms[platforms.length - 1].x < canvas.width) {
    createPlatform(canvas.width + Math.random() * 200);
  }

  // 掉落
  if (player.y > canvas.height) {
    gameOver = true;
    setTimeout(() => {
      alert("游戏结束！分数：" + score);
    }, 100);
  }
}

// 绘制
function draw() {
  ctx.fillStyle = "#0f0f1a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 平台
  ctx.fillStyle = "#4caf50";
  platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  // 玩家
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();
}

// 循环
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
